<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Suplementos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1> Estoque de Suplementos</h1>
        
        <div class="form-section">
            <h2>Cadastrar Novo Produto</h2>
            <form id="form-suplemento">
                <input type="text" id="nome" placeholder="Nome do Suplemento (Ex: Whey)" required>
                
                <select id="categoria" required>
                    <option value="" disabled selected>Selecione a Categoria</option>
                    <option value="Proteína">Proteína (Whey, Albumina)</option>
                    <option value="Creatina">Creatina</option>
                    <option value="Pré-treino">Pré-treino</option>
                    <option value="Vitaminas">Multi-Vitaminico</option>
                </select> 
    <input type="number" id="quantidade" placeholder="Quantidade em Estoque" required min="1">
    <input type="number" id="precoCusto" placeholder="Preço de Custo (R$)" step="0.01" required>
    <input type="number" id="precoVenda" placeholder="Preço de Venda (R$)" step="0.01" required>
    <input type="text" id="lote" placeholder="Lote do Produto" required>
    <input type="date" id="validade" required title="Data de Validade do Produto">
    <button type="submit">Cadastrar Suplemento</button>
            
            </form>
        </div>

        <div class="table-section">
            <h2>Estoque Atual</h2>
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Categoria</th>
                        <th>Quantidade</th>
                        <th>Preço a custo</th>
                        <th>Preço a venda</th>
                        <th>lote
                    
                        </th>
                        <th>Validade do Produto</th>
                    </tr>
                </thead>
                <tbody id="tabela-corpo">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
